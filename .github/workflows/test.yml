name: Test

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install
        run: uv sync --extra api --extra dev

      - name: Verify generated API schemas
        run: |
          uv run python scripts/export_api_schemas.py
          git diff --exit-code -- schemas/

      - name: Test
        env:
          PYTHON_DOTENV_DISABLED: "1"
        run: uv run pytest -q
